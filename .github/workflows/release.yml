name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux-x86_64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libwayland-dev \
            libxkbcommon-dev \
            libfontconfig1-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Check tag matches Cargo version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          want="${GITHUB_REF_NAME#v}"
          have="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)"
          if [ "$want" != "$have" ]; then
            echo "tag v$want does not match Cargo.toml version $have" >&2
            exit 1
          fi

      - name: Build release binaries
        run: cargo build --release --locked

      - name: Package
        id: package
        run: |
          name="psst-${GITHUB_REF_NAME}-x86_64-linux"
          mkdir "$name"
          cp target/release/psst-pinentry target/release/psst-keyring-prompter target/release/psst-polkit-agent README.md "$name"/
          strip "$name"/psst-pinentry "$name"/psst-keyring-prompter "$name"/psst-polkit-agent
          tar -czf "$name.tar.gz" "$name"
          sha256sum "$name.tar.gz" > "$name.tar.gz.sha256"
          echo "archive=$name.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.archive }}.sha256
